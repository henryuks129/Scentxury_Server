# ============================================
# Release Workflow
# ============================================
# 
# Handles version releases and changelog generation.
# Triggered by pushing version tags (v*.*.*)
#
# ============================================

name: 📦 Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: true
        type: string
      prerelease:
        description: 'Is this a pre-release?'
        required: false
        default: false
        type: boolean

env:
  NODE_VERSION: '20.x'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ============================================
  # Validate & Build
  # ============================================
  validate:
    name: ✅ Validate Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🏷️ Get Version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION=${GITHUB_REF#refs/tags/v}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Version: $VERSION"

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📚 Install Dependencies
        run: npm ci --prefer-offline

      - name: 🧪 Run Tests
        run: npm run test

      - name: 🔨 Build
        run: npm run build

  # ============================================
  # Docker Release Image
  # ============================================
  docker-release:
    name: 🐳 Docker Release
    runs-on: ubuntu-latest
    needs: [validate]
    permissions:
      contents: read
      packages: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 📝 Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: 🔨 Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ needs.validate.outputs.version }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}

  # ============================================
  # Create GitHub Release
  # ============================================
  github-release:
    name: 📝 GitHub Release
    runs-on: ubuntu-latest
    needs: [validate, docker-release]
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📝 Generate Changelog
        id: changelog
        uses: orhun/git-cliff-action@v3
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGELOG.md

      - name: 🏷️ Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Scentxury v${{ needs.validate.outputs.version }}
          body: |
            ## 🚀 Scentxury Backend v${{ needs.validate.outputs.version }}

            ### Docker Image
            ```bash
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.validate.outputs.version }}
            ```

            ### Changelog
            ${{ steps.changelog.outputs.content }}

            ### Full Changelog
            https://github.com/${{ github.repository }}/compare/v${{ needs.validate.outputs.version }}...HEAD
          draft: false
          prerelease: ${{ inputs.prerelease || false }}
          generate_release_notes: true

      - name: 📢 Notify Release
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "🎉 Scentxury v${{ needs.validate.outputs.version }} Released!",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*🎉 New Release: Scentxury v${{ needs.validate.outputs.version }}*\n\nDocker: `${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.validate.outputs.version }}`\n\n<https://github.com/${{ github.repository }}/releases/tag/v${{ needs.validate.outputs.version }}|View Release Notes>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # ============================================
  # Deploy Release to Production
  # ============================================
  deploy-release:
    name: 🚀 Deploy Release
    runs-on: ubuntu-latest
    needs: [validate, docker-release, github-release]
    environment:
      name: production
      url: https://api.scentxury.com

    steps:
      - name: 🔐 Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: 🚀 Deploy to Production
        run: |
          echo "🚀 Deploying v${{ needs.validate.outputs.version }} to production..."
          aws ecs update-service \
            --cluster scentxury-production \
            --service scentxury-api \
            --force-new-deployment

      - name: ⏳ Wait for Deployment
        run: |
          aws ecs wait services-stable \
            --cluster scentxury-production \
            --services scentxury-api

      - name: 🏥 Health Check
        run: |
          for i in {1..10}; do
            response=$(curl -s https://api.scentxury.com/health | jq -r '.status')
            if [ "$response" == "healthy" ]; then
              echo "✅ Production is healthy!"
              exit 0
            fi
            sleep 10
          done
          exit 1
