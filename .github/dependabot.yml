# ============================================
# Dependabot Configuration
# ============================================
# 
# Automatically creates PRs for dependency updates
#
# ============================================

version: 2

registries:
  npm-registry:
    type: npm-registry
    url: https://registry.npmjs.org
    replaces-base: true

updates:
  # NPM Dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
      timezone: "Africa/Lagos"
    open-pull-requests-limit: 10
    reviewers:
      - "chi-fragrance/backend-team"
    labels:
      - "dependencies"
      - "npm"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      # Group minor and patch updates
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      # Group TypeScript ecosystem
      typescript:
        patterns:
          - "typescript"
          - "@types/*"
        update-types:
          - "minor"
          - "patch"
      # Group testing tools
      testing:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "supertest"
          - "@types/supertest"
      # Group linting tools
      linting:
        patterns:
          - "eslint"
          - "prettier"
          - "@typescript-eslint/*"
    ignore:
      # Ignore major updates for critical packages
      - dependency-name: "mongoose"
        update-types: ["version-update:semver-major"]
      - dependency-name: "express"
        update-types: ["version-update:semver-major"]

  # Docker Dependencies
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:00"
      timezone: "Africa/Lagos"
    reviewers:
      - "chi-fragrance/backend-team"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore(docker)"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:00"
      timezone: "Africa/Lagos"
    reviewers:
      - "chi-fragrance/backend-team"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(ci)"
